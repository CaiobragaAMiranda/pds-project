services:
  db:
    image: postgres:15-alpine
    container_name: pds_postgres
    environment:
      POSTGRES_DB: pds_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pds_redis
    ports:
      - "6379:6379"

  etl_scheduler:
    build:
      context: .
      dockerfile: pds-data/Dockerfile
    container_name: pds_etl_scheduler
    depends_on:
      - db
      - redis
    volumes:
      - ./pds-data/src:/app/src
      - ./.env:/app/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    command: ["python", "-m", "pds.pipeline"]

  etl_worker:
    build:
      context: .
      dockerfile: pds-data/Dockerfile
    depends_on:
      - db
      - redis
    volumes:
      - ./pds-data/src:/app/src
      - ./.env:/app/.env
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - MAX_ANALYZE_PROCS=2
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128 # Otimiza fragmentação de VRAM
    command: ["celery", "-A", "pds.tasks", "worker", "--loglevel=info"]
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 1G # Aumentado para 1GB RAM por worker para lidar com PyTorch
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  dashboard:
    build:
      context: .
      dockerfile: pds-data/Dockerfile
    container_name: pds_dashboard
    depends_on:
      - db
    volumes:
      - ./pds-data/src:/app/src
      - ./.env:/app/.env
    environment:
      - DB_HOST=db
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "src/pds/dashboard.py", "--server.address=0.0.0.0"]
 # Escala horizontal: 2 workers rodando em paralelo

volumes:
  postgres_data:
